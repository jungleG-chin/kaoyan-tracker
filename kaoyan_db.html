function normalizeSubject(subject) {
  if (!subject) return '?';
  const s = String(subject).trim();
  if (s.startsWith('408-') || s.startsWith('408_')) return '408';
  if (s === '数学' || s === '数二') return '数学二';
  if (s === '英语' || s === '英二') return '英语二';
  if (s === '思政' || s === '政治理论') return '政治';
  return s;
}

function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h << 5) - h + s.charCodeAt(i);
  return h;
}

let _cachedAutoWeaks = null;

function buildWeaksFromLogs(force) {
  if (_cachedAutoWeaks && !force) return _cachedAutoWeaks;
  const groups = {};
  const knowledgeItems = [];

  for (const log of LOGS_RAW) {
    if (!log.questions) continue;
    for (const q of log.questions) {
      const qid = String(q.id || '');
      const isKnowledge = qid.startsWith('K_') || qid.startsWith('K-') || qid.startsWith('INSIGHT_');

      if (isKnowledge) {
        const normSubject = normalizeSubject(q.subject);
        const normChapter = normalizeChapter(q.subject, q.chapter);
        knowledgeItems.push({
          id: 'auto_k_' + qid + '_' + log.date,
          subject: normSubject, chapter: normChapter,
          type: q.topic || '知识点',
          knowledgeType: q.knowledgeType || '总结',
          detail: q.keyAnswer || q.question || '',
          sev: '知', count: 1, date: log.date, ref: qid, qIds: [qid],
          resolved: false, _isKnowledge: true, _auto: true
        });
        continue;
      }

      if (!q.isWrong && q.status === 'pass') continue;

      const chapter = normalizeChapter(q.subject, q.chapter);
      const type = q.topic || '未知类型';
      const key = normalizeSubject(q.subject) + '|||' + chapter + '|||' + type;
      if (!groups[key]) {
        groups[key] = { subject: normalizeSubject(q.subject), chapter, type, items: [], qIds: [], dates: [] };
      }
      groups[key].items.push({ log, q });
      groups[key].qIds.push(q.id);
      groups[key].dates.push(log.date);
    }
  }

  const result = [];
  for (const key in groups) {
    const g = groups[key];
    g.items.sort((a, b) => a.log.date.localeCompare(b.log.date));
    const hasFail = g.items.some(i => i.q.status === 'fail');
    const latest = g.items[g.items.length - 1];
    const stableId = 'auto_' + Math.abs(hashCode(g.subject + '|||' + g.chapter + '|||' + g.type)).toString(36);
    result.push({
      id: stableId, subject: g.subject, chapter: g.chapter, type: g.type,
      knowledgeType: latest.q.knowledgeType || '错题',
      detail: latest.q.missing || (g.qIds.length + ' 次出错：' + g.qIds.join(' / ')),
      sev: hasFail ? '高' : '中', count: g.qIds.length, date: g.items[0].log.date,
      ref: g.qIds.join('/'), qIds: g.qIds, resolved: false, _auto: true
    });
  }
  result.push(...knowledgeItems);

  const resolvedState = getResolvedState();
  result.forEach(w => {
    if (resolvedState[w.id]) w.resolved = true;
  });
  _cachedAutoWeaks = result;
  return result;
}

function getWeaks() { return buildWeaksFromLogs(); }

function getResolvedState() {
  try { return JSON.parse(localStorage.getItem('kaoyan_resolved_cache') || '{}'); } catch(e) { return {}; }
}
function saveResolvedState(state) {
  localStorage.setItem('kaoyan_resolved_cache', JSON.stringify(state || {}));
}

function saveWeaks(weaks) {
  const resolvedState = {};
  (weaks || []).forEach(w => { if (w.resolved) resolvedState[w.id] = true; });
  saveResolvedState(resolvedState);
  _cachedAutoWeaks = null;
}

// ========== 倒计时 ==========
function updateCountdown() {
  const exam = new Date('2026-12-26');
  const now = new Date();
  const days = Math.ceil((exam - now) / (1000 * 60 * 60 * 24));
  document.getElementById('countdown').textContent = '距考研 ' + days + ' 天';
}

// ========== 根据 Q 编号找对应日志 ==========
function findLogByQid(qid, subject) {
  if (!qid) return null;
  const normSubject = subject ? normalizeSubject(subject) : null;
  for (const log of LOGS_RAW) {
    if (!log.questions) continue;
    const q = log.questions.find(qq => qq.id === qid && (!normSubject || normalizeSubject(qq.subject) === normSubject));
    if (q) return { log, q };
  }
  return null;
}

// ========== Toast ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ========== Tab 切换 ==========
let currentWeakFilter = 'all';
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['weak', 'log', 'memo'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'weak') renderWeakTree();
  if (name === 'log') renderLog();
  if (name === 'memo') renderMemo();
}

// ========== 弱点库渲染 ==========
function filterWeaks(filter, el) {
  currentWeakFilter = filter;
  document.querySelectorAll('#page-weak .filter-pill').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  renderWeakTree();
}

function renderWeakTree() {
  const all = getWeaks();
  let weaks = all;
  if (currentWeakFilter === 'resolved') {
    weaks = all.filter(w => w.resolved);
  } else if (currentWeakFilter === 'high') {
    weaks = all.filter(w => w.sev === '高' && !w.resolved);
  } else if (currentWeakFilter !== 'all') {
    weaks = all.filter(w => w.subject === currentWeakFilter && !w.resolved);
  } else {
    weaks = all.filter(w => !w.resolved);
  }

  const activeWeaks = all.filter(w => !w.resolved);
  const knowledgeCount = activeWeaks.filter(w => w._isKnowledge).length;
  const mistakeCount = activeWeaks.filter(w => !w._isKnowledge).length;
  const stats = {
    高: activeWeaks.filter(w => w.sev === '高').length,
    中: activeWeaks.filter(w => w.sev === '中').length,
    低: activeWeaks.filter(w => w.sev === '低').length
  };
  document.getElementById('weak-stats').innerHTML =
    `<div class="stat-box"><div class="val">${mistakeCount}</div><div class="lbl">错题</div></div>
    <div class="stat-box"><div class="val" style="color:#a32d2d">${stats.高}</div><div class="lbl">高危</div></div>
    <div class="stat-box"><div class="val" style="color:#185fa5">${knowledgeCount}</div><div class="lbl">知识卡</div></div>
    <div class="stat-box"><div class="val" style="color:#3b6d11">${all.filter(w => w.resolved).length}</div><div class="lbl">已掌握</div></div>`;

  const tree = document.getElementById('weak-tree');
  const subHasWeak = {};
  Object.keys(SYLLABUS).forEach(k => { subHasWeak[k] = weaks.some(w => w.subject === k && (!w.resolved || currentWeakFilter === 'resolved')); });

  const subjects = Object.keys(SYLLABUS).filter(s => {
    if (currentWeakFilter === 'all') return subHasWeak[s];
    if (currentWeakFilter === 'high' || currentWeakFilter === 'resolved') return subHasWeak[s];
    return s === currentWeakFilter;
  });

  if (subjects.length === 0) { tree.innerHTML = '<div class="empty">🎉 当前筛选下暂无弱点</div>'; return; }

  let html = '';
  subjects.forEach(subKey => {
    const sub = SYLLABUS[subKey];
    const subWeaks = weaks.filter(w => w.subject === subKey && (!w.resolved || currentWeakFilter === 'resolved'));
    if (subWeaks.length === 0) return;
    const subHighCount = subWeaks.filter(w => w.sev === '高' && !w.resolved).length;
    const subKCount = subWeaks.filter(w => w._isKnowledge).length;

    html += `<div class="weak-subject" onclick="toggleSub(this)">
      <span><span class="subject-tag subject-${subKey}">${sub.name || subKey}</span> <span class="chev">▶</span></span>
      <span class="count">${subWeaks.length} 条${subHighCount > 0 ? ' · 🟥' + subHighCount : ''}${subKCount > 0 ? ' · 💡' + subKCount : ''}</span>
    </div>`;
    html += '<div class="weak-chapters">';

    const syllabusChapters = sub.chapters || [];
    const weakChapters = [...new Set(subWeaks.map(w => w.chapter))];
    const allChapters = [...new Set([...syllabusChapters, ...weakChapters])];

    allChapters.forEach(ch => {
      const chWeaks = subWeaks.filter(w => w.chapter === ch);
      if (chWeaks.length === 0) {
        if (currentWeakFilter === subKey && syllabusChapters.includes(ch)) {
          html += `<div class="weak-chapter"><span class="name" style="color:#ccc;font-size:12px;">${ch}</span><span class="count" style="color:#ccc;">—</span></div>`;
        }
      } else {
        const hasHigh = chWeaks.some(w => w.sev === '高');
        const hasK = chWeaks.some(w => w._isKnowledge);
        const isInSyllabus = syllabusChapters.includes(ch);
        const chName = isInSyllabus ? ch : `<span style="color:#a32d2d">*</span> ${ch}`;
        html += `<div class="weak-chapter has-weak ${hasHigh ? 'has-高' : ''} ${isInSyllabus ? '' : 'not-in-syllabus'}" onclick="toggleChapter(this)">
          <span class="name">${chName}</span>
          <span class="count">${chWeaks.length} 条${hasHigh ? ' 🟥' : ''}${hasK ? ' 💡' : ''}</span>
        </div>`;
        html += '<div class="weak-items">';
        chWeaks.forEach(w => {
          const isKnowledge = w._isKnowledge;
          const qIdChips = isKnowledge ? '' : (w.qIds || []).map(q => {
            const safeQ = (q || '').toString();
            const num = safeQ.replace('Q', '').replace('(', '').replace(')', '');
            return `<span class="q-chip q${num}">${safeQ}</span>`;
          }).join(' ');
          const logRef = findLogByQid(w.qIds && w.qIds[0], w.subject);
          const keyAns = logRef && logRef.q ? (logRef.q.keyAnswer || '') : '';

          html += `<div class="weak-item ${w.resolved ? 'resolved' : ''} ${isKnowledge ? 'knowledge-item' : ''}" onclick="locateWeak('${w.id}')">
            <div class="top">
              <span class="sev-tag ${isKnowledge ? '知' : w.sev}">${isKnowledge ? '💡' : w.sev}</span>
              <span class="type-tag" style="font-size:11px;padding:1px 5px;border-radius:3px;margin-left:4px;${w.knowledgeType === '总结' ? 'background:#e8f4fc;color:#185fa5;' : 'background:#fce8e8;color:#a32d2d;'}">${w.knowledgeType || (isKnowledge ? '总结' : '错题')}</span>
              <strong class="type">${w.type}</strong>
              ${qIdChips}
              ${isKnowledge ? '' : `<span style="font-size:11px;color:#888;margin-left:auto;">×${w.count}</span>`}
            </div>
            <div class="detail">${w.detail}</div>
            ${keyAns ? `<div class="answer"><b>${isKnowledge ? '总结' : '标准答案'}：</b>${keyAns.split('\n')[0]}</div>` : ''}
            <div class="meta">📅 ${w.date}${w.ref && !isKnowledge ? ' · 与 ' + w.ref + ' 同源' : (w.ref && isKnowledge ? ' · ' + w.ref : '')}</div>
            <div class="actions" onclick="event.stopPropagation()">
              <button class="locate-btn" onclick="locateToLog('${w.id}')">📍 定位到日志</button>
            </div>
          </div>`;
        });
        html += '</div>';
      }
    });
    html += '</div>';
  });
  tree.innerHTML = html;
  expandAllWeaks();
}

function toggleSub(el) { el.classList.toggle('open'); }
function toggleChapter(el) { el.classList.toggle('open'); }

let weakTreeExpanded = false;
function expandAllWeaks() {
  if (weakTreeExpanded) return;
  weakTreeExpanded = true;
  document.querySelectorAll('.weak-subject').forEach(el => el.classList.add('open'));
  document.querySelectorAll('.weak-chapter.has-weak').forEach(el => el.classList.add('open'));
}

function locateWeak(weakId) {
  const w = getWeaks().find(x => x.id === weakId);
  if (!w || !w.qIds || w.qIds.length === 0) { showToast('该弱点未关联具体题目'); return; }
  locateToLog(weakId);
}

function locateToLog(weakId) {
  const w = getWeaks().find(x => x.id === weakId);
  if (!w || !w.qIds || w.qIds.length === 0) { showToast('该弱点未关联具体题目'); return; }
  switchTab('log');
  setTimeout(() => {
    const qid = w.qIds[0];
    const target = findLogByQid(qid, w.subject);
    if (target) {
      const idx = LOGS_RAW.indexOf(target.log);
      const detail = document.getElementById('log-detail-' + idx);
      if (detail) detail.style.display = 'block';
    }
    const targetId = target ? 'qblock-' + target.log.date + '_' + qid : 'qblock-' + qid;
    const el = document.getElementById(targetId);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      document.querySelectorAll('.q-block.highlight').forEach(n => n.classList.remove('highlight'));
      el.classList.add('highlight');
      setTimeout(() => el.classList.remove('highlight'), 4000);
      showToast('已定位到 ' + qid);
    } else { showToast('题目块未找到：' + qid); }
  }, 220);
}

function locateToWeakFromLog(qid, subject) {
  const weak = getWeaks().find(w => w.subject === subject && (w.qIds || []).includes(qid));
  if (!weak) { showToast('该题目未关联弱点'); return; }
  switchTab('weak');
  setTimeout(() => {
    document.querySelectorAll('.weak-subject').forEach(el => el.classList.add('open'));
    document.querySelectorAll('.weak-chapter.has-weak').forEach(el => el.classList.add('open'));
    const target = document.querySelector(`.weak-item[onclick*="${weak.id}"]`);
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      document.querySelectorAll('.weak-item.highlight').forEach(n => n.classList.remove('highlight'));
      target.classList.add('highlight');
      setTimeout(() => target.classList.remove('highlight'), 4000);
      showToast('已定位到弱点：' + weak.type);
    } else { showToast('未找到弱点块（可能已掌握）'); }
  }, 220);
}

// ========== 日志渲染 ==========
let currentLogFilter = 'unresolved';

function filterLogByStatus(status, el) {
  currentLogFilter = status;
  document.querySelectorAll('#page-log .filter-pill').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  renderLog();
}

function isQResolved(q) {
  const qid = String(q.id || '');
  if (qid.startsWith('K_') || qid.startsWith('K-') || qid.startsWith('INSIGHT_')) return false;
  const w = getWeaks().find(x => x.subject === q.subject && (x.qIds || []).includes(q.id));
  return w ? w.resolved : false;
}

function renderLog() {
  const container = document.getElementById('log-container');
  if (LOGS_RAW.length === 0) { container.innerHTML = '<div class="empty">暂无日志</div>'; return; }

  let html = '';
  LOGS_RAW.forEach((l, i) => {
    const allQs = l.questions || [];
    allQs.forEach(q => { if (!q._uid) q._uid = l.date + '_' + q.id; });
    const filteredQs = currentLogFilter === 'all' ? allQs
      : currentLogFilter === 'resolved' ? allQs.filter(q => isQResolved(q))
      : allQs.filter(q => {
          const qid = String(q.id || '');
          if (qid.startsWith('K_') || qid.startsWith('K-') || qid.startsWith('INSIGHT_')) return true;
          return !isQResolved(q);
        });
    if (filteredQs.length === 0) return;

    const totalQ = allQs.length;
    const unresolvedCount = allQs.filter(q => !isQResolved(q)).length;
    const avgScore = totalQ > 0 ? (allQs.reduce((s, q) => s + (q.score || 0), 0) / totalQ).toFixed(1) : '-';
    const headerHint = currentLogFilter === 'unresolved'
      ? `<span style="color:#a32d2d;">● ${unresolvedCount} 题未掌握</span>`
      : currentLogFilter === 'resolved'
        ? `<span style="color:#1d9e75;">● ${filteredQs.length} 题已掌握</span>`
        : `<span>共 ${totalQ} 题</span>`;
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div>
        <div style="font-weight:500;font-size:14px;">${l.date} · ${l.title}</div>
        <div class="log-row-summary" style="margin-top:2px;">${headerHint} · 平均分 ${avgScore}</div>
      </div>
      <button onclick="toggleLogDetail(${i})" style="font-size:11px;padding:4px 12px;border:0.5px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;color:#555;">收起题目 ▲</button>
      </div>
      <div id="log-detail-${i}" style="display:block;">
        ${filteredQs.map(q => renderQBlock(q)).join('')}
      </div>
    </div>`;
  });

  if (html === '') {
    const hint = currentLogFilter === 'unresolved' ? '🎉 太棒了，所有题目都已掌握！' : '该筛选下暂无题目';
    container.innerHTML = `<div class="empty">${hint}</div>`;
  } else { container.innerHTML = html; }
}

function renderQBlock(q) {
  const isKnowledge = String(q.id || '').startsWith('K_') || String(q.id || '').startsWith('K-');
  const scoreClass = q.status || (q.score >= 8 ? 'pass' : q.score >= 5 ? 'warn' : 'fail');
  const scoreLabel = q.status === 'pass' ? '✅ 合格' : q.status === 'warn' ? '⚠️ 缺漏' : q.status === 'fail' ? '❌ 不合格' : (q.score >= 8 ? '✅' : q.score >= 5 ? '⚠️' : '❌');

  if (isKnowledge) {
    const linkedWeak = getWeaks().find(w => w.subject === q.subject && (w.qIds || []).includes(q.id));
    const resolved = linkedWeak ? linkedWeak.resolved : false;
    const weakIdAttr = linkedWeak ? linkedWeak.id : '';
    const uid = q._uid || q.id;
    return `<div class="q-block" id="qblock-${uid}" style="border-left-color:#5494c9;">
      <div class="q-head">
        <span class="k-tag" style="font-size:10px;padding:1px 6px;border-radius:3px;background:#e8f4fc;color:#185fa5;font-weight:500;">💡 知识卡</span>
        <span class="q-title">${q.topic || q.id || ''}</span>
        <span style="font-size:10px;color:#888;margin-left:auto;">${q.subject || ''}</span>
      </div>
      <div class="q-body">
        <div class="q-you"><b>问题/触发：</b>${q.question || ''}</div>
        ${q.keyAnswer ? `<div class="q-key">${q.keyAnswer}</div>` : ''}
        <div class="q-actions" onclick="event.stopPropagation()">
          ${linkedWeak ? `<button class="mastered-btn ${resolved ? 'on' : ''}" onclick="toggleMastered('${weakIdAttr}')">${resolved ? '↺ 已掌握 · 恢复' : '✓ 标记已掌握'}</button>
          <button class="again-btn" onclick="addCount('${weakIdAttr}')">+1 再次命中</button>` : ''}
          <button class="locate-btn" onclick="locateToWeakFromLog('${q.id}', '${q.subject}')">📍 定位到弱点库</button>
          ${linkedWeak && resolved ? '<span class="resolved-flag">已从弱点库移除</span>' : ''}
        </div>
      </div>
    </div>`;
  }

  const linkedWeak = getWeaks().find(w => w.subject === q.subject && (w.qIds || []).includes(q.id));
  const resolved = linkedWeak ? linkedWeak.resolved : false;
  const weakIdAttr = linkedWeak ? linkedWeak.id : '';
  const uid = q._uid || (q.subject + '_' + q.id);
  return `<div class="q-block" id="qblock-${uid}">
    <div class="q-head">
      <span class="q-chip ${String(q.id).toLowerCase().replace(/[()]/g,'')}">${q.id}</span>
      <span class="q-score ${scoreClass}">${scoreLabel} ${q.score || 0}/${q.max || 10}</span>
      <span class="q-title">${q.topic || ''}</span>
      <span style="font-size:10px;color:#888;margin-left:auto;">${q.subject || ''}</span>
    </div>
    <div class="q-body">
      <div class="q-you"><b>题目：</b>${q.question || ''}</div>
      <div class="q-you"><b>你的回答：</b>${q.userAnswer || '（未作答）'}</div>
      ${q.isWrong || q.missing ? `<div class="q-err">${q.missing || ''}</div>` : ''}
      ${q.keyAnswer ? `<div class="q-key">${q.keyAnswer}</div>` : ''}
      ${linkedWeak ? `<div class="q-actions" onclick="event.stopPropagation()">
        <button class="mastered-btn ${resolved ? 'on' : ''}" onclick="toggleMastered('${weakIdAttr}')">${resolved ? '↺ 已掌握 · 恢复' : '✓ 标记已掌握'}</button>
        <button class="again-btn" onclick="addCount('${weakIdAttr}')">+1 再次命中</button>
        <button class="locate-btn" onclick="locateToWeakFromLog('${q.id}', '${q.subject}')">📍 定位到弱点库</button>
        ${resolved ? '<span class="resolved-flag">已从弱点库移除</span>' : ''}
      </div>` : ''}
    </div>
  </div>`;
}

function toggleLogDetail(i) {
  const row = document.getElementById('log-detail-' + i);
  if (!row) return;
  row.style.display = row.style.display === 'none' ? 'block' : 'none';
}

function toggleMastered(id) {
  const weaks = getWeaks();
  const w = weaks.find(x => x.id === id);
  if (!w) return;
  w.resolved = !w.resolved;
  saveWeaks(weaks);
  renderWeakTree();
  renderLog();
  showToast(w.resolved ? '✓ 已标记掌握' : '↺ 已恢复');
}

function addCount(id) {
  const weaks = getWeaks();
  const w = weaks.find(x => x.id === id);
  if (w) { w.count += 1; saveWeaks(weaks); renderWeakTree(); renderLog(); showToast('+1 命中'); }
}

// ========== 速记卡渲染 ==========
function renderMemo() {
  const c = document.getElementById('memo-container');
  c.innerHTML = `<div class="memo-grid">${MEMO_CARDS.map(m => {
    let body = '';
    if (m.steps) {
      body = m.steps.map(s => `<div class="memo-step">${s}</div>`).join('');
    } else if (m.formulas) {
      body = m.formulas.map(f => `<span class="memo-formula">${f}</span>`).join('');
    } else if (m.table) {
      body = `<table class="memo-table">${m.table.map(row => `<tr><td>${row[0]}</td><td>${row[1]}${row[2] ? ' <span style="color:#888;font-size:10px;">[' + row[2] + ']</span>' : ''}</td></tr>`).join('')}</table>`;
    }
    return `<div class="memo-card">
      <span class="memo-tag">${m.tag}</span>
      <h3>${m.title}</h3>
      ${body}
      ${m.example ? `<div class="memo-formula" style="background:#eef5fc;color:#185fa5;">${m.example}</div>` : ''}
      ${m.tip ? `<div class="memo-tip">💡 ${m.tip}</div>` : ''}
    </div>`;
  }).join('')}</div>`;
}

// ========== 初始化（同步执行，无需 await） ==========
try {
  updateCountdown();
  renderWeakTree();
  renderMemo();
} catch(e) {
  document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;max-width:800px;margin:0 auto;"><h2 style="color:#a32d2d;">⚠️ 页面加载出错</h2><p style="color:#666;">' + e.message + '</p><pre style="background:#f5f5f0;padding:16px;border-radius:6px;overflow:auto;font-size:12px;">' + (e.stack || '') + '</pre></div>';
}
</script>
</body>
</html>
